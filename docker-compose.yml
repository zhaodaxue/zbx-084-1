version: '3.8'

services:
  backend:
    build: ./backend
    container_name: water-quality-backend
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./sample-data:/app/sample-data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/water.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: water-quality-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
